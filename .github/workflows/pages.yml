name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare pages content
        run: |
          echo "Building static sites..."

          mkdir public

          find . -type f -name "index.html" -not -path "./public/*" | while read file
          do
            dir=$(dirname "$file")
            name=$(basename "$dir")

            echo "Processing site: $name"

            mkdir -p public/$name
            cp -r "$dir/"* public/$name/
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
